name: Repository validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate required files
        shell: bash
        run: |
          set -euo pipefail

          test -f README.md
          test -f CODEX_REPORT.md
          test -f .env.example
          test -f .gitignore
          test -f package.json
          test -f scripts/github-setup.js
          test -f ai_server.ps1
          test -f web/index.html
          test -f web/app.js
          test -f web/styles.css
          test -f web/sw.js
          test -f web/manifest.webmanifest
          test -f web/assets/toktrend-logo.png
          test -f app/src/main/java/com/example/network/TikTokApiService.kt
          test -f app/src/main/java/com/example/network/GeminiService.kt
          test -f .github/workflows/build-apk.yml
          test -f .github/workflows/deploy-pages.yml
          test ! -d .github/workflows/.github

      - name: Validate web JavaScript
        run: node --check web/app.js

      - name: Validate sensitive files are not tracked
        shell: bash
        run: |
          set -euo pipefail

          if git ls-files | grep -E '(^|/)(\.env|\.env\.local|\.env\.production|\.env\.development|\.tiktok_token\.json|\.tiktok_oauth_state\.json|secrets\.json|credentials\.json|token\.json|id_rsa|id_rsa\.pub)$'; then
            echo "Sensitive file is tracked."
            exit 1
          fi

          if git ls-files | grep -E '(\.pem|\.key)$'; then
            echo "Sensitive key material is tracked."
            exit 1
          fi

          if git ls-files | grep -E '(^|/)node_modules/'; then
            echo "node_modules is tracked."
            exit 1
          fi

      - name: Scan obvious secret patterns
        shell: bash
        run: |
          set -euo pipefail

          if git grep -n -E 'sk-(proj-)?[A-Za-z0-9_-]{24,}|gh[pousr]_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|AIza[A-Za-z0-9_-]{20,}|-----BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE KEY-----' -- ':!*.png' ':!*.jpg' ':!*.jpeg' ':!*.webp' ':!*.webm' ':!*.mp4' ':!.env.example'; then
            echo "Possible secret detected in tracked files."
            exit 1
          fi
